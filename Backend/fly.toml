# fly.toml app configuration file generated for email-job-schedulers
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'email-job-schedulers'
primary_region = 'bom'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

# Server process group (handles HTTP requests)
[processes]
  server = 'node dist/server.js'
  worker = 'node dist/worker.js'

[env]
  PORT = '4000'
  NODE_ENV = 'production'

# HTTP service configuration (only for server process)
[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['server']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/v1/health'

# Server machine configuration
[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  processes = ['server']

# Worker machine configuration
[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  processes = ['worker']
