# fly.toml app configuration file for Email Job Scheduler - Server
# Deploy with: fly deploy -c fly.server.toml

app = 'email-job-schedulers-server'
primary_region = 'bom'

[build]

[deploy]
  release_command = 'npx prisma migrate deploy'

[env]
  PORT = '4000'
  NODE_ENV = 'production'

# HTTP service configuration
[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/api/v1/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
